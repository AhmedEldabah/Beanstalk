<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
    <title>Pizza Menu — Saviro</title>
    <meta name="description" content="Saviro pizza menu — wood-fired and stone-baked classics." />
    <meta name="theme-color" content="#0d0c0c" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pizza Menu — Saviro" />
    <meta property="og:image" content="assets/og-cover.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="manifest" href="manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg-base: #121010;
            --bg-surface: rgba(35, 32, 32, 0.55);
            --accent: #FFB7B2;
            --accent-glow: rgba(255, 183, 178, 0.2);
            --text-main: #FDFCF8;
            --text-muted: #A8A29E;
            --border: rgba(255, 255, 255, 0.08);
            --trans: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            --shadow-soft: 0 4px 30px rgba(0, 0, 0, 0.5);
            --shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.8);
            --radius-lg: 2rem;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-base); color: var(--text-main); min-height: 100vh; -webkit-font-smoothing: antialiased; padding-bottom: 120px; }

        .global-blobs { position: fixed; inset: 0; z-index: -1; pointer-events: none; overflow: hidden; }
        .blob { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.22; animation: float 8s ease-in-out infinite alternate; }
        .blob-1 { width: 60vw; height: 60vw; max-width: 700px; max-height: 700px; background: #FF7EB3; top: -10%; left: -10%; }
        .blob-2 { width: 50vw; height: 50vw; max-width: 550px; max-height: 550px; background: #F59E0B; bottom: -5%; right: -10%; animation-delay: -3s; }
        .blob-3 { width: 35vw; height: 35vw; max-width: 400px; max-height: 400px; background: #8E84FA; top: 40%; left: 50%; animation-delay: -5s; }
        @keyframes float { 0% { transform: translateY(0) scale(1); } 100% { transform: translateY(30px) scale(1.1); } }
        .grain-overlay { position: fixed; inset: 0; z-index: 9999; pointer-events: none; background: url('data:image/svg+xml,%3Csvg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"%3E%3Cfilter id="noiseFilter"%3E%3CfeTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/%3E%3C/filter%3E%3Crect width="100%25" height="100%25" filter="url(%23noiseFilter)" opacity="0.35"/%3E%3C/svg%3E'); mix-blend-mode: overlay; opacity: 0.4; }

        nav { position: sticky; top: 0; background: rgba(20,18,18,0.88); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border-bottom: 1px solid var(--border); z-index: 100; padding: 0.9rem 1.5rem; display: flex; align-items: center; gap: 1rem; }
        .nav-back { display: flex; align-items: center; gap: 0.5rem; color: var(--text-muted); font-size: 0.9rem; text-decoration: none; transition: color 0.3s; flex-shrink: 0; }
        .nav-back:hover { color: var(--text-main); }
        .logo-text { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-main); }
        .logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
        .nav-title { font-size: 1rem; font-weight: 600; color: var(--text-main); flex: 1; text-align: center; }
        .nav-menu-switch { display: flex; gap: 0.3rem; flex-shrink: 0; }
        .msw-link { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: rgba(255,255,255,0.05); font-size: 1rem; text-decoration: none; transition: var(--trans); }
        .msw-link:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
        .msw-link.current { background: rgba(255,183,178,0.15); border-color: rgba(255,183,178,0.4); }

        /* STYLE TOGGLE */
        .style-toggle-wrap { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem 0; }
        .style-toggle { display: inline-flex; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 50px; padding: 4px; gap: 4px; }
        .style-btn { padding: 0.5rem 1.4rem; border-radius: 50px; border: none; font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: var(--trans); color: var(--text-muted); background: transparent; }
        .style-btn.active { background: var(--accent); color: var(--bg-base); font-weight: 700; }
        .style-btn:not(.active):hover { color: var(--text-main); }
        .style-desc { font-size: 0.8rem; color: var(--text-muted); margin-top: 0.8rem; padding: 0 1.5rem; max-width: 1100px; }

        .menu-hero { padding: 1.2rem 1.5rem 1.5rem; max-width: 1100px; margin: 0 auto; }
        .menu-hero h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; margin-bottom: 0.4rem; }
        .menu-hero p { color: var(--text-muted); font-size: 0.9rem; }

        .content { max-width: 1100px; margin: 0 auto; padding: 1.5rem 1.5rem; }

        /* PIZZA CARD */
        .pizza-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
        .pizza-card {
            background: var(--bg-surface); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 18px;
            padding: 1.2rem; transition: var(--trans); position: relative; overflow: hidden;
        }
        .pizza-card::before {
            content: '🍕';
            position: absolute; right: -8px; bottom: -8px;
            font-size: 4.5rem; opacity: 0.06; pointer-events: none;
        }
        .pizza-card:hover { border-color: rgba(255,255,255,0.15); }
        .pizza-card.in-cart { border-color: rgba(255,183,178,0.35); background: rgba(255,183,178,0.07); }
        .pizza-name { font-size: 1.05rem; font-weight: 600; margin-bottom: 0.5rem; }
        .pizza-price-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .pizza-price { font-size: 1rem; font-weight: 700; color: var(--accent); }
        .pizza-price-small { font-size: 0.8rem; color: var(--text-muted); }
        .pizza-controls { display: flex; align-items: center; justify-content: space-between; gap: 0.6rem; }
        .qty-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--border); background: rgba(255,255,255,0.08); color: var(--text-main); font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
        .qty-btn:hover { background: var(--accent); color: var(--bg-base); border-color: var(--accent); }
        .qty-num { min-width: 22px; text-align: center; font-size: 0.95rem; font-weight: 600; }
        .add-pizza-btn { flex: 1; padding: 0.55rem 1rem; background: rgba(255,183,178,0.12); border: 1px solid rgba(255,183,178,0.3); border-radius: 50px; color: var(--accent); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: var(--trans); display: flex; align-items: center; justify-content: center; gap: 0.4rem; }
        .add-pizza-btn:hover { background: var(--accent); color: var(--bg-base); }

        /* CART BAR */
        .cart-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: 4000;
            background: rgba(20,18,18,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
        }
        .cart-bar.visible { transform: translateY(0); }
        .cart-bar-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
        .cart-info { flex: 1; }
        .cart-count { font-size: 0.8rem; color: var(--text-muted); }
        .cart-total { font-size: 1.1rem; font-weight: 700; }
        .cart-checkout-btn { padding: 0.85rem 2rem; background: var(--accent); color: var(--bg-base); border: none; border-radius: 50px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: var(--trans); white-space: nowrap; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
        .cart-checkout-btn:hover { box-shadow: 0 6px 20px var(--accent-glow); }
        .cart-view-btn { padding: 0.85rem 1.2rem; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 50px; color: var(--text-main); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: var(--trans); white-space: nowrap; }
        .cart-view-btn:hover { background: rgba(255,255,255,0.14); }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 5000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-sheet { background: #1c1a1a; border: 1px solid var(--border); border-radius: 2rem 2rem 0 0; padding: 2rem 1.5rem; width: 100%; max-width: 560px; transform: translateY(60px); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1); max-height: 85vh; overflow-y: auto; }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }
        .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.5rem; }
        .option-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; transition: var(--trans); margin-bottom: 0.5rem; }
        .option-item.selected { border-color: var(--accent); background: rgba(255,183,178,0.08); }
        .option-item input[type="radio"] { accent-color: var(--accent); width: 16px; height: 16px; cursor: pointer; }
        .modal-add-btn { width: 100%; padding: 0.95rem; background: var(--accent); color: var(--bg-base); border: none; border-radius: 50px; font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 1.2rem; transition: var(--trans); }
        .modal-add-btn:hover { box-shadow: 0 6px 20px var(--accent-glow); }
    </style>
</head>
<body>
<div class="global-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
<div class="grain-overlay"></div>

<nav>
    <a href="index.html" class="nav-back"><i class="fas fa-arrow-left"></i></a>
    <a href="index.html" class="logo-text"><div class="logo-dot"></div> Saviro</a>
    <span class="nav-title">Pizza Menu</span>
    <div class="nav-menu-switch">
        <a href="menu.html" class="msw-link" title="Full Menu">🍽️</a>
        <a href="pizza-menu.html" class="msw-link current" title="Pizza Menu">🍕</a>
    </div>
</nav>

<div class="menu-hero">
    <h1>🍕 Pizza Menu</h1>
    <p>All prices in EGP · Subject to 14% sales tax + 12% service charge</p>
</div>

<!-- STYLE TOGGLE -->
<div class="style-toggle-wrap">
    <div class="style-toggle">
        <button class="style-btn active" id="btn-napolitan" onclick="setStyle('napolitan')">Neapolitan</button>
        <button class="style-btn" id="btn-ny" onclick="setStyle('ny')">New York Style</button>
    </div>
</div>
<p class="style-desc" id="style-desc">Neapolitan — thin, soft, charred crust with authentic Italian toppings</p>

<div class="content">
    <div class="pizza-grid" id="pizza-grid"><!-- rendered by JS --></div>
</div>

<!-- CART BAR -->
<div class="cart-bar" id="cart-bar">
    <div class="cart-bar-inner">
        <div class="cart-info">
            <div class="cart-count" id="cart-count-label">0 items</div>
            <div class="cart-total" id="cart-total-label">EGP 0</div>
        </div>
        <button class="cart-view-btn" onclick="viewCart()"><i class="fas fa-shopping-bag"></i> View Cart</button>
        <a class="cart-checkout-btn" href="order.html">Checkout <i class="fas fa-arrow-right"></i></a>
    </div>
</div>

<!-- CART MODAL -->
<div class="modal-overlay" id="cart-modal-overlay" onclick="closeCartOnBackdrop(event)">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.2rem;">
            <h2 style="font-size:1.2rem;font-weight:700;">Your Cart</h2>
            <button onclick="document.getElementById('cart-modal-overlay').classList.remove('open')" style="background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.1rem;"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items-list"></div>
        <div id="cart-summary-footer"></div>
    </div>
</div>

<script>
const PIZZA_ITEMS = [
    { id: 'margherita',          name: 'Margherita',          prices: { napolitan: 280, ny: 295 } },
    { id: 'bufalina',            name: 'Bufalina',            prices: { napolitan: 330, ny: 345 } },
    { id: 'italiana',            name: 'Italiana',            prices: { napolitan: 355, ny: 365 } },
    { id: 'five_cheese',         name: 'Five Cheese',         prices: { napolitan: 365, ny: 380 } },
    { id: 'burrata_pizza',       name: 'Burrata',             prices: { napolitan: 395, ny: 400 } },
    { id: 'diavola',             name: 'Diavola',             prices: { napolitan: 360, ny: 375 } },
    { id: 'oriental_sausage',    name: 'Oriental Sausage',    prices: { napolitan: 360, ny: 375 } },
    { id: 'bbq_chicken_pizza',   name: 'BBQ Chicken',         prices: { napolitan: 345, ny: 360 } },
    { id: 'buffalo_chicken',     name: 'Buffalo Chicken',     prices: { napolitan: 355, ny: 365 } },
    { id: 'chicken_shwrma_pizza',name: 'Chicken Shawerma',    prices: { napolitan: 345, ny: 360 } },
    { id: 'smoked_salmon_pizza', name: 'Smoked Salmon',       prices: { napolitan: 420, ny: 450 } },
    { id: 'seafood_pizza',       name: 'Seafood',             prices: { napolitan: 430, ny: 475 } },
];

const STYLE_DESC = {
    napolitan: 'Neapolitan — thin, soft, charred crust with authentic Italian toppings',
    ny:        'New York Style — wider, foldable slices with a crispy, chewy crust',
};

let activeStyle = 'napolitan';
let cart = [];

function loadCart() {
    try { const s = sessionStorage.getItem('sv_cart'); if (s) cart = JSON.parse(s); } catch(e) { cart = []; }
}

function saveCart() { sessionStorage.setItem('sv_cart', JSON.stringify(cart)); }

function cartId(pizzaId) { return pizzaId + '_' + activeStyle; }

function getCartQty(pizzaId) {
    const item = cart.find(i => i.id === cartId(pizzaId));
    return item ? item.qty : 0;
}

function cartCount() { return cart.reduce((s, i) => s + i.qty, 0); }
function cartTotal() { return cart.reduce((s, i) => s + i.qty * i.price, 0); }

function setStyle(style) {
    activeStyle = style;
    document.getElementById('btn-napolitan').classList.toggle('active', style === 'napolitan');
    document.getElementById('btn-ny').classList.toggle('active', style === 'ny');
    document.getElementById('style-desc').textContent = STYLE_DESC[style];
    renderPizzas();
}

function renderPizzas() {
    const grid = document.getElementById('pizza-grid');
    grid.innerHTML = PIZZA_ITEMS.map(pizza => {
        const price = pizza.prices[activeStyle];
        const qty = getCartQty(pizza.id);
        const inCart = qty > 0;
        return `<div class="pizza-card ${inCart ? 'in-cart' : ''}" id="pc-${pizza.id}">
            <div class="pizza-name">${pizza.name}</div>
            <div class="pizza-price-row">
                <div>
                    <div class="pizza-price">EGP ${price}</div>
                    <div class="pizza-price-small">Other style: EGP ${pizza.prices[activeStyle === 'napolitan' ? 'ny' : 'napolitan']}</div>
                </div>
            </div>
            <div class="pizza-controls">
                ${inCart ? `
                    <button class="qty-btn" onclick="changeQty('${pizza.id}',-1)"><i class="fas fa-minus" style="font-size:0.6rem"></i></button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" onclick="changeQty('${pizza.id}',1)"><i class="fas fa-plus" style="font-size:0.6rem"></i></button>
                ` : `
                    <button class="add-pizza-btn" onclick="changeQty('${pizza.id}',1)">
                        <i class="fas fa-plus"></i> Add to Cart
                    </button>
                `}
            </div>
        </div>`;
    }).join('');
}

function changeQty(pizzaId, delta) {
    const pizza = PIZZA_ITEMS.find(p => p.id === pizzaId);
    if (!pizza) return;
    const id = cartId(pizzaId);
    const label = `${pizza.name} (${activeStyle === 'napolitan' ? 'Neapolitan' : 'NY Style'})`;
    const price = pizza.prices[activeStyle];
    const existing = cart.find(i => i.id === id);
    const newQty = Math.max(0, (existing ? existing.qty : 0) + delta);
    if (newQty === 0) {
        cart = cart.filter(i => i.id !== id);
    } else if (existing) {
        existing.qty = newQty;
    } else {
        cart.push({ id, name: label, price, qty: newQty, note: activeStyle === 'napolitan' ? 'Neapolitan' : 'NY Style' });
    }
    saveCart();
    refreshCard(pizzaId);
    updateCartBar();
}

function refreshCard(pizzaId) {
    const el = document.getElementById('pc-' + pizzaId);
    if (!el) return;
    const pizza = PIZZA_ITEMS.find(p => p.id === pizzaId);
    if (!pizza) return;
    const price = pizza.prices[activeStyle];
    const qty = getCartQty(pizzaId);
    const inCart = qty > 0;
    const newHtml = `<div class="pizza-card ${inCart ? 'in-cart' : ''}" id="pc-${pizza.id}">
        <div class="pizza-name">${pizza.name}</div>
        <div class="pizza-price-row">
            <div>
                <div class="pizza-price">EGP ${price}</div>
                <div class="pizza-price-small">Other style: EGP ${pizza.prices[activeStyle === 'napolitan' ? 'ny' : 'napolitan']}</div>
            </div>
        </div>
        <div class="pizza-controls">
            ${inCart ? `
                <button class="qty-btn" onclick="changeQty('${pizza.id}',-1)"><i class="fas fa-minus" style="font-size:0.6rem"></i></button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="changeQty('${pizza.id}',1)"><i class="fas fa-plus" style="font-size:0.6rem"></i></button>
            ` : `
                <button class="add-pizza-btn" onclick="changeQty('${pizza.id}',1)">
                    <i class="fas fa-plus"></i> Add to Cart
                </button>
            `}
        </div>
    </div>`;
    el.outerHTML = newHtml;
}

function updateCartBar() {
    const count = cartCount();
    const total = cartTotal();
    const bar = document.getElementById('cart-bar');
    if (count > 0) {
        bar.classList.add('visible');
        document.getElementById('cart-count-label').textContent = `${count} item${count !== 1 ? 's' : ''}`;
        document.getElementById('cart-total-label').textContent = `EGP ${total}`;
    } else {
        bar.classList.remove('visible');
    }
}

function viewCart() {
    renderCartModal();
    document.getElementById('cart-modal-overlay').classList.add('open');
}

function renderCartModal() {
    const list = document.getElementById('cart-items-list');
    const footer = document.getElementById('cart-summary-footer');
    if (!cart.length) {
        list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:0.9rem;">Your cart is empty.</div>';
        footer.innerHTML = '';
        return;
    }
    list.innerHTML = cart.map(item => `
        <div style="display:flex;align-items:center;gap:0.8rem;padding:0.8rem 0;border-bottom:1px solid var(--border);">
            <div style="flex:1;min-width:0;">
                <div style="font-size:0.9rem;font-weight:500;">${item.name}</div>
                <div style="font-size:0.85rem;color:var(--accent);margin-top:3px;">EGP ${item.price}</div>
            </div>
            <div style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0;">
                <button class="qty-btn" onclick="cartAdjust('${item.id}',-1)"><i class="fas fa-minus" style="font-size:0.6rem"></i></button>
                <span style="min-width:20px;text-align:center;font-weight:600;">${item.qty}</span>
                <button class="qty-btn" onclick="cartAdjust('${item.id}',1)"><i class="fas fa-plus" style="font-size:0.6rem"></i></button>
            </div>
            <div style="font-size:0.9rem;font-weight:600;min-width:60px;text-align:right;">EGP ${item.qty * item.price}</div>
        </div>`).join('');

    const total = cartTotal();
    footer.innerHTML = `
        <div style="padding-top:1rem;border-top:1px solid var(--border);margin-top:0.5rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <span style="font-size:1rem;font-weight:700;">Total</span>
                <span style="font-size:1.1rem;font-weight:700;color:var(--accent);">EGP ${total}</span>
            </div>
            <a href="order.html" style="display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;padding:0.95rem;background:var(--accent);color:var(--bg-base);border:none;border-radius:50px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;text-decoration:none;">
                Proceed to Checkout <i class="fas fa-arrow-right"></i>
            </a>
        </div>`;
}

function cartAdjust(itemId, delta) {
    const item = cart.find(i => i.id === itemId);
    if (!item) return;
    item.qty = Math.max(0, item.qty + delta);
    if (item.qty === 0) cart = cart.filter(i => i.id !== itemId);
    saveCart();
    updateCartBar();
    renderCartModal();
    // refresh the pizza card if it matches active style
    const pizzaId = itemId.replace('_napolitan', '').replace('_ny', '');
    const pizza = PIZZA_ITEMS.find(p => p.id === pizzaId);
    if (pizza) refreshCard(pizza.id);
}

function closeCartOnBackdrop(e) {
    if (e.target === document.getElementById('cart-modal-overlay')) {
        document.getElementById('cart-modal-overlay').classList.remove('open');
    }
}

loadCart();
renderPizzas();
updateCartBar();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function() {});
    });
}
</script>
</body>
</html>
