        .nav-back:hover { color: var(--text-main); }
        .logo-text { font-size: 1.2rem; font-weight: 700; display: flex; align-items: center; gap: 8px; text-decoration: none; color: var(--text-main); }
        .logo-dot { width: 7px; height: 7px; background: var(--accent); border-radius: 50%; }
        .nav-title { font-size: 1rem; font-weight: 600; color: var(--text-main); flex: 1; text-align: center; }
        .nav-menu-switch { display: flex; gap: 0.3rem; flex-shrink: 0; }
        .msw-link { display: flex; align-items: center; justify-content: center; width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border); background: rgba(255,255,255,0.05); font-size: 1rem; text-decoration: none; transition: var(--trans); }
        .msw-link:hover { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.2); }
        .msw-link.current { background: rgba(255,183,178,0.15); border-color: rgba(255,183,178,0.4); }

        .cat-bar { position: sticky; top: 57px; z-index: 90; background: rgba(18,16,16,0.92); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 0.7rem 1.5rem; overflow-x: auto; white-space: nowrap; scrollbar-width: none; }

        .cat-pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.45rem 1rem; border-radius: 50px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 500; cursor: pointer; transition: var(--trans); white-space: nowrap; margin-right: 0.4rem; }

        .cat-pill:not(.active):hover { color: var(--text-main); border-color: rgba(255,255,255,0.2); }

        .menu-hero { padding: 2rem 1.5rem 0.5rem; max-width: 1100px; margin: 0 auto; }
        .menu-hero h1 { font-size: clamp(1.8rem, 4vw, 2.6rem); font-weight: 700; margin-bottom: 0.4rem; }
        .menu-hero p { color: var(--text-muted); font-size: 0.9rem; }
        .kaiyo-badge { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.3rem 0.9rem; background: rgba(255,183,178,0.1); border: 1px solid rgba(255,183,178,0.2); border-radius: 50px; font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-top: 0.6rem; margin-bottom: 0.5rem; }

        .sushi-section-icon { font-size: 1.4rem; }
        .sushi-section-title { font-size: 1.05rem; font-weight: 700; }
        .sushi-section-note { font-size: 0.78rem; color: var(--text-muted); margin-left: auto; font-style: italic; }

        /* ITEM CARD */
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.7rem; }
        .mi-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.9rem 1rem; border-radius: 14px;
            background: var(--bg-surface); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);

        .mi-info { flex: 1; min-width: 0; }
        .mi-name { font-size: 0.9rem; font-weight: 500; line-height: 1.3; }
        .mi-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
        .mi-price { font-size: 0.88rem; font-weight: 700; color: var(--accent); margin-top: 4px; }
        .mi-controls { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
        .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: rgba(255,255,255,0.08); color: var(--text-main); font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: background 0.2s; flex-shrink: 0; }
        .qty-btn:hover { background: var(--accent); color: var(--bg-base); border-color: var(--accent); }
        .qty-num { min-width: 20px; text-align: center; font-size: 0.9rem; font-weight: 600; }
        .add-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid rgba(255,183,178,0.4); background: rgba(255,183,178,0.1); color: var(--accent); font-size: 0.85rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--trans); }
        .add-btn:hover { background: var(--accent); color: var(--bg-base); border-color: var(--accent); }

        /* COMBOS */
        .combo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 0.7rem; }
        .combo-card {
            padding: 1.2rem; border-radius: 16px;
            background: var(--bg-surface); border: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; text-align: center; gap: 0.5rem;
            transition: var(--trans);

        .combo-card:hover { border-color: rgba(255,183,178,0.3); }
        .combo-card.in-cart { border-color: rgba(255,183,178,0.4); background: rgba(255,183,178,0.07); }
        .combo-pcs { font-size: 1.4rem; font-weight: 700; }
        .combo-label { font-size: 0.78rem; color: var(--text-muted); }
        .combo-price { font-size: 1rem; font-weight: 700; color: var(--accent); }
        .combo-controls { display: flex; align-items: center; gap: 0.4rem; margin-top: 0.3rem; }

        /* CART BAR */
        .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 4000; background: rgba(20,18,18,0.97); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding: 1rem 1.5rem; transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1); }
        .cart-bar.visible { transform: translateY(0); }
        .cart-bar-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 1rem; }
        .cart-info { flex: 1; }
        .cart-count { font-size: 0.8rem; color: var(--text-muted); }
        .cart-total { font-size: 1.1rem; font-weight: 700; }
        .cart-checkout-btn { padding: 0.85rem 2rem; background: var(--accent); color: var(--bg-base); border: none; border-radius: 50px; font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 700; cursor: pointer; transition: var(--trans); white-space: nowrap; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }

        .cart-view-btn { padding: 0.85rem 1.2rem; background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 50px; color: var(--text-main); font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: var(--trans); white-space: nowrap; }

        /* MODAL */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 5000; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.open { opacity: 1; pointer-events: all; }
        .modal-sheet { background: #1c1a1a; border: 1px solid var(--border); border-radius: 2rem 2rem 0 0; padding: 2rem 1.5rem; width: 100%; max-width: 560px; transform: translateY(60px); transition: transform 0.4s cubic-bezier(0.22,1,0.36,1); max-height: 80vh; overflow-y: auto; }
        .modal-overlay.open .modal-sheet { transform: translateY(0); }
        .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 1.5rem; }
    </style>
</head>

<div class="modal-overlay" id="cart-modal-overlay" onclick="closeCartOnBackdrop(event)">

    { id: 'dynamite_shrimp_r',  cat: 'dynamite', name: 'Shrimp Dynamite',          desc: '8 pcs — crispy shrimp, dynamite sauce', price: 215 },
    { id: 'dynamite_mixed',     cat: 'dynamite', name: 'Mixed Dynamite',           desc: '8 pcs — salmon & tuna dynamite',      price: 225 },
    { id: 'dynamite_scallop',   cat: 'dynamite', name: 'Scallop Dynamite',         desc: '8 pcs — premium scallop',             price: 233 },
    { id: 'gunkan_salmon_roe',  cat: 'dynamite', name: 'Salmon Roe Gunkan',        desc: 'Per piece — tobiko & ikura',          price: 75  },
    { id: 'gunkan_sea_urchin',  cat: 'dynamite', name: 'Sea Urchin Gunkan',        desc: 'Per piece — premium uni',             price: 75  },
    { id: 'mono_maki_salmon',   cat: 'dynamite', name: 'Mono Maki Salmon',         desc: '5 pcs — large single-ingredient roll', price: 175 },
    { id: 'mono_maki_tuna',     cat: 'dynamite', name: 'Mono Maki Tuna',           desc: '5 pcs — large single-ingredient roll', price: 180 },
    // COMBOS
    { id: 'combo_12',           cat: 'combos',   name: 'Combo 12 pcs',             desc: "Chef's selection, 12 pieces",         price: 290  },
    { id: 'combo_24',           cat: 'combos',   name: 'Combo 24 pcs',             desc: "Chef's selection, 24 pieces",         price: 560  },
    { id: 'combo_48',           cat: 'combos',   name: 'Combo 48 pcs',             desc: "Chef's selection, 48 pieces",         price: 1095 },
    { id: 'combo_75',           cat: 'combos',   name: 'Combo 75 pcs',             desc: "Chef's selection, 75 pieces",         price: 1660 },
    { id: 'combo_100',          cat: 'combos',   name: 'Combo 100 pcs',            desc: "Chef's selection, 100 pieces",        price: 2145 },
];

let activeCat = 'all';
let cart = [];

function loadCart() {
    try { const s = sessionStorage.getItem('sv_cart'); if (s) cart = JSON.parse(s); } catch(e) { cart = []; }
}
function saveCart() { sessionStorage.setItem('sv_cart', JSON.stringify(cart)); }
function getCartItem(id) { return cart.find(i => i.id === id); }
function getCartQty(id) { const item = getCartItem(id); return item ? item.qty : 0; }
function cartCount() { return cart.reduce((s, i) => s + i.qty, 0); }
function cartTotal() { return cart.reduce((s, i) => s + i.qty * i.price, 0); }

function changeQty(itemId, delta) {
    const menuItem = SUSHI_ITEMS.find(i => i.id === itemId);
    if (!menuItem) return;
    const existing = getCartItem(itemId);
    const newQty = Math.max(0, (existing ? existing.qty : 0) + delta);
    if (newQty === 0) cart = cart.filter(i => i.id !== itemId);
    else if (existing) existing.qty = newQty;
    else cart.push({ id: itemId, name: menuItem.name, price: menuItem.price, qty: newQty, note: menuItem.desc || '' });
    saveCart();
    refreshItemCard(itemId);
    updateCartBar();
}

function renderItemCard(item) {
    const qty = getCartQty(item.id);
    const inCart = qty > 0;
    if (item.cat === 'combos') {
        return `<div class="combo-card ${inCart ? 'in-cart' : ''}" id="mic-${item.id}">
            <div class="combo-pcs">${item.name.replace('Combo ','')}</div>
            <div class="combo-label">${item.desc}</div>
            <div class="combo-price">EGP ${item.price}</div>
            <div class="combo-controls">
                ${inCart ? `
                    <button class="qty-btn" onclick="changeQty('${item.id}',-1)"><i class="fas fa-minus" style="font-size:0.6rem"></i></button>
                    <span class="qty-num">${qty}</span>
                    <button class="qty-btn" onclick="changeQty('${item.id}',1)"><i class="fas fa-plus" style="font-size:0.6rem"></i></button>
                ` : `
                    <button class="qty-btn" style="width:auto;padding:0 0.8rem;border-radius:50px;background:rgba(255,183,178,0.1);border-color:rgba(255,183,178,0.3);color:var(--accent);" onclick="changeQty('${item.id}',1)"><i class="fas fa-plus" style="font-size:0.6rem;margin-right:4px;"></i> Add</button>
                `}
            </div>
        </div>`;
    }
    return `<div class="mi-card ${inCart ? 'in-cart' : ''}" id="mic-${item.id}">
        <div class="mi-info">
            <div class="mi-name">${item.name}</div>
            ${item.desc ? `<div class="mi-desc">${item.desc}</div>` : ''}
            <div class="mi-price">EGP ${item.price}</div>
        </div>
        <div class="mi-controls">
            ${inCart ? `
                <button class="qty-btn" onclick="changeQty('${item.id}',-1)"><i class="fas fa-minus" style="font-size:0.6rem"></i></button>
                <span class="qty-num">${qty}</span>
                <button class="qty-btn" onclick="changeQty('${item.id}',1)"><i class="fas fa-plus" style="font-size:0.6rem"></i></button>
            ` : `
                <button class="add-btn" onclick="changeQty('${item.id}',1)"><i class="fas fa-plus" style="font-size:0.75rem"></i></button>
            `}
        </div>
    </div>`;
}

function refreshItemCard(itemId) {
    const el = document.getElementById('mic-' + itemId);
    if (!el) return;
    const item = SUSHI_ITEMS.find(i => i.id === itemId);
    if (!item) return;
    el.outerHTML = renderItemCard(item);
}

function renderSushi() {
    const container = document.getElementById('sushi-content');
    let html = '';
    SUSHI_SECTIONS.forEach(section => {
        if (activeCat !== 'all' && activeCat !== section.id) return;
        const items = SUSHI_ITEMS.filter(i => i.cat === section.id);
        if (!items.length) return;
        const isCombo = section.id === 'combos';
        html += `<div class="sushi-section" id="sec-${section.id}">
            <div class="sushi-section-header">
                <span class="sushi-section-icon">${section.icon}</span>
                <span class="sushi-section-title">${section.label}</span>
                ${section.note ? `<span class="sushi-section-note">${section.note}</span>` : ''}
            </div>
            <div class="${isCombo ? 'combo-grid' : 'items-grid'}">
                ${items.map(renderItemCard).join('')}
            </div>
        </div>`;
    });
    container.innerHTML = html;
}

function filterCat(catId) {
    activeCat = catId;
    document.querySelectorAll('.cat-pill').forEach((pill, i) => {
        const cats = ['all','starters','nigiri','hosomaki','uramaki','hot','dynamite','combos'];
        pill.classList.toggle('active', cats[i] === catId);
    });
    renderSushi();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function updateCartBar() {
    const count = cartCount();
    const total = cartTotal();
    const bar = document.getElementById('cart-bar');
    if (count > 0) {
        bar.classList.add('visible');
        document.getElementById('cart-count-label').textContent = `${count} item${count !== 1 ? 's' : ''}`;
        document.getElementById('cart-total-label').textContent = `EGP ${total}`;
    } else {
        bar.classList.remove('visible');
    }
}

function viewCart() {
    renderCartModal();
    document.getElementById('cart-modal-overlay').classList.add('open');
}

function renderCartModal() {
    const list = document.getElementById('cart-items-list');
    const footer = document.getElementById('cart-summary-footer');
    if (!cart.length) {
        list.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--text-muted);font-size:0.9rem;">Your cart is empty.</div>';
        footer.innerHTML = '';
        return;
    }
    list.innerHTML = cart.map(item => `
        <div style="display:flex;align-items:center;gap:0.8rem;padding:0.8rem 0;border-bottom:1px solid var(--border);">
            <div style="flex:1;min-width:0;">
                <div style="font-size:0.9rem;font-weight:500;">${item.name}</div>
                <div style="font-size:0.85rem;color:var(--accent);margin-top:3px;">EGP ${item.price}</div>
            </div>
            <div style="display:flex;align-items:center;gap:0.4rem;flex-shrink:0;">
                <button class="qty-btn" onclick="cartAdjust('${item.id}',-1)"><i class="fas fa-minus" style="font-size:0.6rem"></i></button>
                <span style="min-width:20px;text-align:center;font-weight:600;">${item.qty}</span>
                <button class="qty-btn" onclick="cartAdjust('${item.id}',1)"><i class="fas fa-plus" style="font-size:0.6rem"></i></button>
            </div>
            <div style="font-size:0.9rem;font-weight:600;min-width:60px;text-align:right;">EGP ${item.qty * item.price}</div>
        </div>`).join('');

    const total = cartTotal();
    footer.innerHTML = `
        <div style="padding-top:1rem;border-top:1px solid var(--border);margin-top:0.5rem;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
                <span style="font-size:1rem;font-weight:700;">Total</span>
                <span style="font-size:1.1rem;font-weight:700;color:var(--accent);">EGP ${total}</span>
            </div>
            <a href="order.html" style="display:flex;align-items:center;justify-content:center;gap:0.5rem;width:100%;padding:0.95rem;background:var(--accent);color:var(--bg-base);border:none;border-radius:50px;font-family:'Outfit',sans-serif;font-size:1rem;font-weight:700;text-decoration:none;">
                Proceed to Checkout <i class="fas fa-arrow-right"></i>
            </a>
        </div>`;
}

function cartAdjust(itemId, delta) {
    const item = cart.find(i => i.id === itemId);
    if (!item) return;
    item.qty = Math.max(0, item.qty + delta);
    if (item.qty === 0) cart = cart.filter(i => i.id !== itemId);
    saveCart();
    refreshItemCard(itemId);
    updateCartBar();
    renderCartModal();
}

function closeCartOnBackdrop(e) {
    if (e.target === document.getElementById('cart-modal-overlay')) {
        document.getElementById('cart-modal-overlay').classList.remove('open');
    }
}

loadCart();
renderSushi();
updateCartBar();

if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
        navigator.serviceWorker.register('sw.js').catch(function() {});
    });
}
</script>
</body>
</html>
